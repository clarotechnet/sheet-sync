name: Deploy Hostinger

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Build e enviar para Hostinger
    runs-on: ubuntu-latest

    steps:
      - name: Baixar código
        uses: actions/checkout@v4

      - name: Configurar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Instalar dependências
        run: npm ci

      - name: Gerar build
        run: npm run build

      - name: Criar arquivo teste
        run: echo "deploy teste $(date)" > dist/deploy-teste.txt

      - name: Enviar dist para Hostinger
        uses: SamKirkland/FTP-Deploy-Action@v4.4.0
        with:
          server: ${{ secrets.HOSTINGER_FTP_SERVER }}
          username: ${{ secrets.HOSTINGER_FTP_USERNAME }}
          password: ${{ secrets.HOSTINGER_FTP_PASSWORD }}
          port: 21
          local-dir: ./dist/
          server-dir: /public_html/sistema/
